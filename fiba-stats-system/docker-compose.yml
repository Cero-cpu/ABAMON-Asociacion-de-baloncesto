services:
  db:
    image: postgres:15-alpine
    container_name: fiba-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fiba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-fiba_stats}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fiba-backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fiba}:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/${POSTGRES_DB:-fiba_stats}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change_me_in_production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - PYTHONUNBUFFERED=1
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fiba-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  backend_data:
