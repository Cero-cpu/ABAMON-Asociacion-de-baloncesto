services:
  - type: web
    name: fiba-stats-system
    env: python
    buildCommand: |
      cd backend && pip install -r requirements.txt
      cd ../frontend && npm install && npm run build
    startCommand: cd backend && gunicorn app.app:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./fiba_stats.db
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 8000
